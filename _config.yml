# 站点基础信息
name: 地缘政治与思想观察
title: 地缘政治与思想观察
description: |
  透过战争与权力，洞察文明的深层结构。

  关注地缘政治与思想演化：中美、俄乌、全球冲突、金融与能源博弈、AI 竞争，以及人生哲理。

url: https://brucehho.github.io
baseurl: "/blog"

# 主题与插件（使用 GitHub Pages 官方支持）
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 匿名：不展示作者信息
author: {}

# 架构
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# 导航
nav:
  - title: 首页
    url: /
  - title: 关于
    url: /about/

# SEO
seo:
  type: Blog
  name: 地缘政治与思想观察

# 允许显示"今天"及未来日期的文章（修复时区导致文章不显示的问题）
future: true

# 忽略
exclude:
  - Gemfile
  - Gemfile.lock

